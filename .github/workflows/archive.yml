name: Archive Discord channels

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: discord-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run archiver
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNELS: ${{ vars.DISCORD_CHANNELS }}
        run: python scripts/archive.py

      - name: Commit and push
        run: |
          git config user.name  "nous-archive-bot"
          git config user.email "nous-archive-bot@users.noreply.github.com"
          git add archives/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "archive: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
